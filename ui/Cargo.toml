[package]
name = "ngos-ui"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"
doctest = false

[dependencies]
ngos-gfx-translate = { path = "../gfx-translate" }
ngos-compositor = { path = "../compositor" }
ngos-render3d = { path = "../render3d" }
ngos-scene-graph = { path = "../scene-graph" }
ngos-input-translate = { path = "../input-translate" }
skia-safe = { version = "0.93.1", optional = true }

[features]
default = []
skia-preview = ["dep:skia-safe"]
